<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Optimizer</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-analytics-compat.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 class="logo">OptiImage</h1>
      <button class="btn-upload" id="uploadBtn">
        <i class="fas fa-upload"></i> Upload
      </button>
      <i class="fas fa-user-circle login-icon" id="loginIcon" title="Login"></i>
    </div>
  </nav>

  <main class="hero">
    <div class="container">
      <h1>Optimize Images Instantly</h1>
      <p>Reduce file size while maintaining quality</p>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="drop-content">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>Drag & Drop your image here</p>
          <span>or</span>
          <button class="btn-browse" id="browseBtn">Browse Files</button>
        </div>
      </div>

      <div class="preview-section" id="previewSection">
        <div class="image-preview">
          <img id="previewImage" src="" alt="Preview">
        </div>

        <div class="size-info">
          <div class="size-card original">
            <span>Original</span>
            <strong id="originalSize">0 KB</strong>
          </div>

          <div class="savings-indicator">
            <i class="fas fa-arrow-right"></i>
            <div class="savings-badge" id="savingsBadge">0% smaller</div>
          </div>

          <div class="size-card compressed">
            <span>Compressed</span>
            <strong id="compressedSize">0 KB</strong>
          </div>
        </div>
      </div>

      <!-- Quality Controls -->
      <div class="quality-controls" id="qualityControls">
        <div class="slider-container">
          <label for="qualitySlider">Quality: <span id="qualityValue">80</span>%</label>
          <input type="range" id="qualitySlider" min="1" max="100" value="80">
        </div>
        <button class="btn-download" id="downloadBtn">
          <i class="fas fa-download"></i> Download Optimized Image
        </button>
      </div>
    </div>
  </main>

  <!-- Login Modal -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <h2>Login / Sign Up</h2>
      <input type="email" id="emailInput" placeholder="Email" required>

      <div class="password-container">
        <input type="password" id="passwordInput" placeholder="Password" required>
        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
      </div>

      <p class="forgot" id="forgotPassword">Forgot Password?</p>

      <button id="loginBtn">Login</button>
      <button id="signupBtn">Sign Up</button>

      <p id="authMessage"></p>
    </div>
  </div>

  <!-- Main Script -->
  <script src="script.js"></script>
</body>
</html>
